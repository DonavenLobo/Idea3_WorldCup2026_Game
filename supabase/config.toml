project_id = "gogaffa"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324
smtp_port = 54325
pop3_port = 54326

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "gogaffa://auth/callback"
additional_redirect_urls = [
  "gogaffa://auth/callback",
  "gogaffa://**",
  "exp://**/--/auth/callback",
  "exps://**/--/auth/callback",
  "exp://127.0.0.1:8081/--/auth/callback",
  "exp://localhost:8081/--/auth/callback",
  "https://gogaffa.com",
  "https://gogaffa.com/**"
]
jwt_expiry = 3600
enable_signup = true

[edge_runtime]
enabled = true
policy = "oneshot"
