<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 320" font-family="Inter, system-ui, sans-serif">
  <title>GoGaffa Colour Palette</title>

  <!-- Title -->
  <text x="360" y="36" text-anchor="middle" font-family="Caveat, 'Comic Sans MS', cursive" font-size="28" font-weight="700" fill="#1a1a2e">GoGaffa Colour Palette</text>

  <!-- Row 1: Primary colours -->
  <!-- Cream -->
  <g transform="translate(30, 56)">
    <rect width="200" height="110" rx="12" fill="#f5f0e8" stroke="#1a1a2e" stroke-width="2"/>
    <text x="100" y="140" text-anchor="middle" font-size="16" font-weight="700" fill="#1a1a2e">Cream</text>
    <text x="100" y="158" text-anchor="middle" font-size="12" fill="#1a1a2e" opacity="0.7">#f5f0e8</text>
    <text x="100" y="174" text-anchor="middle" font-size="11" fill="#1a1a2e" opacity="0.5">Background</text>
  </g>

  <!-- Ink -->
  <g transform="translate(260, 56)">
    <rect width="200" height="110" rx="12" fill="#1a1a2e" stroke="#1a1a2e" stroke-width="2"/>
    <text x="100" y="140" text-anchor="middle" font-size="16" font-weight="700" fill="#1a1a2e">Ink</text>
    <text x="100" y="158" text-anchor="middle" font-size="12" fill="#1a1a2e" opacity="0.7">#1a1a2e</text>
    <text x="100" y="174" text-anchor="middle" font-size="11" fill="#1a1a2e" opacity="0.5">Text &amp; Borders</text>
  </g>

  <!-- Red -->
  <g transform="translate(490, 56)">
    <rect width="200" height="110" rx="12" fill="#e63946" stroke="#1a1a2e" stroke-width="2"/>
    <text x="100" y="140" text-anchor="middle" font-size="16" font-weight="700" fill="#1a1a2e">Red</text>
    <text x="100" y="158" text-anchor="middle" font-size="12" fill="#1a1a2e" opacity="0.7">#e63946</text>
    <text x="100" y="174" text-anchor="middle" font-size="11" fill="#1a1a2e" opacity="0.5">Energy &amp; CTAs</text>
  </g>

  <!-- Row 2: Accent colours -->
  <!-- Blue -->
  <g transform="translate(30, 196)">
    <rect width="200" height="110" rx="12" fill="#1d3557" stroke="#1a1a2e" stroke-width="2"/>
    <text x="100" y="140" text-anchor="middle" font-size="16" font-weight="700" fill="#1a1a2e">Blue</text>
    <text x="100" y="158" text-anchor="middle" font-size="12" fill="#1a1a2e" opacity="0.7">#1d3557</text>
    <text x="100" y="174" text-anchor="middle" font-size="11" fill="#1a1a2e" opacity="0.5">Identity &amp; Trust</text>
  </g>

  <!-- Purple -->
  <g transform="translate(260, 196)">
    <rect width="200" height="110" rx="12" fill="#6b4c9a" stroke="#1a1a2e" stroke-width="2"/>
    <text x="100" y="140" text-anchor="middle" font-size="16" font-weight="700" fill="#1a1a2e">Purple</text>
    <text x="100" y="158" text-anchor="middle" font-size="12" fill="#1a1a2e" opacity="0.7">#6b4c9a</text>
    <text x="100" y="174" text-anchor="middle" font-size="11" fill="#1a1a2e" opacity="0.5">Tournament &amp; Prestige</text>
  </g>

  <!-- Success -->
  <g transform="translate(490, 196)">
    <rect width="200" height="110" rx="12" fill="#2f7a4d" stroke="#1a1a2e" stroke-width="2"/>
    <text x="100" y="140" text-anchor="middle" font-size="16" font-weight="700" fill="#1a1a2e">Success</text>
    <text x="100" y="158" text-anchor="middle" font-size="12" fill="#1a1a2e" opacity="0.7">#2f7a4d</text>
    <text x="100" y="174" text-anchor="middle" font-size="11" fill="#1a1a2e" opacity="0.5">Confirmation</text>
  </g>
</svg>
