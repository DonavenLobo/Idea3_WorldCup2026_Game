<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" font-family="Caveat, 'Comic Sans MS', cursive">
  <!-- Cream background -->
  <rect width="1200" height="630" fill="#f5f0e8"/>

  <!-- Paper noise texture overlay -->
  <filter id="noise">
    <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" stitchTiles="stitch"/>
  </filter>
  <rect width="1200" height="630" filter="url(#noise)" opacity="0.04" style="mix-blend-mode:multiply"/>

  <!-- GoGaffa wordmark -->
  <text
    x="600" y="290"
    text-anchor="middle"
    font-size="120"
    font-weight="700"
    fill="#1a1a2e"
    letter-spacing="2"
  >GoGaffa</text>

  <!-- Red accent underline -->
  <path
    d="M 380 310 C 440 300, 560 322, 820 306"
    stroke="#e63946"
    stroke-width="6"
    stroke-linecap="round"
    fill="none"
  />

  <!-- Tagline -->
  <text
    x="600" y="380"
    text-anchor="middle"
    font-size="40"
    font-weight="600"
    fill="#1a1a2e"
    opacity="0.8"
  >Your football summer starts here.</text>
</svg>
